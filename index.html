  });

  // Image upload
  modal.querySelector('#f-image-drop').onclick = () => modal.querySelector('#f-image-file').click();
  modal.querySelector('#f-image-file').onchange = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const dropEl = modal.querySelector('#f-image-drop');
    dropEl.textContent = 'Processing image…';
    try {
      workingImage = await resizeImageFile(file);
      dropEl.innerHTML = `<img src="${workingImage}">`;
    } catch(err){
      dropEl.textContent = 'Could not read that image. Try another file.';
    }
  };

  // Geocode lookup — uses the Name field directly
  modal.querySelector('#f-loc-lookup').onclick = async () => {
    const name = modal.querySelector('#f-name').value.trim();
    const status = modal.querySelector('#f-loc-status');
    if(!name){ status.textContent = 'Enter a destination name first.'; status.className = 'geocode-status err'; return; }
    status.textContent = 'Looking up location…';
    status.className = 'geocode-status';
    try {
      const loc = await geocodeLocation(name);
      modal.querySelector('#f-lat').value = loc.lat;
      modal.querySelector('#f-long').value = loc.long;
      workingLat = loc.lat;
      workingLong = loc.long;
      status.textContent = 'Coordinates filled in below.';
      status.className = 'geocode-status ok';
    } catch(err){
      status.textContent = "Couldn't find that location. Could be no internet, an unrecognized name, or a rate limit. Enter coordinates manually below.";
      status.className = 'geocode-status err';
    }
  };

  function close(){ closeModal(); }
  modal.querySelector('.modal-close').onclick = close;
  modal.querySelector('#f-cancel').onclick = close;
  backdrop.addEventListener('click', (e) => { if(e.target === backdrop) close(); });

  if(isEdit){
    modal.querySelector('#f-delete').onclick = () => confirmDeleteDestination(dest.id);
  }

  modal.querySelector('#f-save').onclick = () => {
    const name = modal.querySelector('#f-name').value.trim();
    const saveStatus = modal.querySelector('#f-save-status');
    if(!name){
      saveStatus.textContent = 'Please give this destination a name.';
      saveStatus.className = 'status-msg err';
      modal.querySelector('#f-name').focus();
      return;
    }
    const lat = parseFloat(modal.querySelector('#f-lat').value);
    const long = parseFloat(modal.querySelector('#f-long').value);

    dest.name = name;
    dest.season = seasonSel.value;
    dest.cost = parseInt(modal.querySelector('#f-cost').value, 10);
    dest.image = workingImage;
    dest.location = { lat: isNaN(lat) ? null : lat, long: isNaN(long) ? null : long };
    dest.ratings = workingRatings;
    dest.visited = modal.querySelector('#f-visited').checked;
    dest.notes = modal.querySelector('#f-notes').value;
    if(!dest.tier) dest.tier = 'unranked';

    if(!isEdit){ DATA.destinations.push(dest); }
    saveData();
    closeModal();
  };

  backdrop.appendChild(modal);
  openModal(backdrop);
}

function renderStarPicker(container, initialValue, onChange){
  let value = initialValue;
  function draw(){
    container.innerHTML = '';
    for(let i=1;i<=5;i++){
      const btn = document.createElement('button');
      btn.textContent = '★';
      btn.className = i <= value ? 'filled' : '';
      btn.onclick = (e) => { e.stopPropagation(); value = (value === i) ? 0 : i; onChange(value); draw(); };
      container.appendChild(btn);
    }
  }
  draw();
}

/* ============================================================
   DESTINATION DETAIL MODAL
   ============================================================ */
function openDetailModal(destId){
  const dest = DATA.destinations.find(d => d.id === destId);
  if(!dest) return;
  const linkedHistory = DATA.history.filter(h => h.destinationId === destId).sort((a,b) => new Date(b.date)-new Date(a.date));

  const backdrop = el(`<div class="modal-backdrop"></div>`);
  const modal = el(`
    <div class="modal">
      <div class="modal-header">
        <h2>${escapeHtml(dest.name)}</h2>
        <button class="modal-close" type="button" aria-label="Close dialog">✕</button>
      </div>
      <div class="modal-body">
        <div class="detail-hero" style="${dest.image?`background-image:url(${dest.image})`:''}"></div>
        <div class="detail-tags">
          <span class="tag">${dest.season || '-'}</span>
          <span class="tag">${'$'.repeat(dest.cost || 0) || '-'}</span>
          <span class="tag">${dest.tier && dest.tier !== 'unranked' ? 'Tier ' + dest.tier : 'Unranked'}</span>
          ${dest.visited ? `<span class="tag" style="color:#1a8a3d;background:#e6f7ea;">Visited</span>` : ''}
        </div>
        ${dest.location.lat != null ? `<p style="font-size:13px;color:var(--text-secondary);margin-bottom:14px;">📍 ${dest.location.lat.toFixed(3)}, ${dest.location.long.toFixed(3)}</p>` : `<p style="font-size:13px;color:var(--text-secondary);margin-bottom:14px;">No coordinates set</p>`}
        <div style="margin-bottom:16px;">
          ${RATING_CATEGORIES.map(cat => `
            <div class="rating-row">
              <span class="cat-name">${cat.label}</span>
              <span class="stars" style="margin-top:0;">${'★'.repeat(dest.ratings[cat.key]||0)}${'☆'.repeat(5-(dest.ratings[cat.key]||0))}</span>
            </div>
          `).join('')}
        </div>
        ${dest.notes ? `<div class="form-group"><label>Notes</label><p style="font-size:13.5px;">${escapeHtml(dest.notes)}</p></div>` : ''}
        <div class="form-group">
          <label>Trip History (${linkedHistory.length})</label>
          ${linkedHistory.length === 0 ? `<p style="font-size:13px;color:var(--text-secondary);">No trips logged for this destination yet.</p>` :
            linkedHistory.map(h => `
              <div class="history-log-item">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                  <span style="font-weight:600;">${formatDate(h.date)}</span>
                  <div style="display:flex;align-items:center;gap:6px;">
                    <span class="stars" style="margin-top:0;">${'★'.repeat(h.rating)}${'☆'.repeat(5-h.rating)}</span>
                    <button class="icon-btn" title="Delete entry" data-history-id="${h.id}">${ICONS.trash}</button>
                  </div>
                </div>
                <div style="color:var(--text-secondary);margin-top:3px;">${escapeHtml(h.summary||'')}</div>
              </div>
            `).join('')
          }
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" id="d-delete" style="margin-right:auto;">Delete</button>
        <button class="btn btn-secondary" id="d-log-trip">Log a Trip</button>
        <button class="btn btn-secondary" id="d-toggle-visited">${dest.visited ? 'Mark as Not Visited' : 'Mark as Visited'}</button>
        <button class="btn btn-primary" id="d-edit">Edit</button>
      </div>
    </div>
  `);

  modal.querySelector('.modal-close').onclick = closeModal;
  backdrop.addEventListener('click', (e) => { if(e.target === backdrop) closeModal(); });
  modal.querySelector('#d-edit').onclick = () => { closeModal(); openAddEditModal(destId); };
  modal.querySelector('#d-delete').onclick = () => confirmDeleteDestination(destId);
  modal.querySelector('#d-toggle-visited').onclick = () => {
    dest.visited = !dest.visited;
    saveData();
    closeModal();
    openDetailModal(destId);
  };
  modal.querySelector('#d-log-trip').onclick = () => {
    closeModal();
    openHistoryModal(destId);
  };
  modal.querySelectorAll('[data-history-id]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const entryId = btn.getAttribute('data-history-id');
      confirmDeleteHistoryEntry(entryId, () => openDetailModal(destId));
    };
  });

  backdrop.appendChild(modal);
  openModal(backdrop);
}

/* ============================================================
   LOG TRIP (HISTORY) MODAL
   ============================================================ */
function openHistoryModal(preselectDestId){
  if(DATA.destinations.length === 0){
    alert('Add a destination first before logging a trip.');
    return;
  }
  let ratingValue = 0;
  const backdrop = el(`<div class="modal-backdrop"></div>`);
  const modal = el(`
    <div class="modal">
      <div class="modal-header">
        <h2>Log a Trip</h2>
        <button class="modal-close" type="button" aria-label="Close dialog">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Destination</label>
          <select id="h-dest"></select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="h-date" value="${new Date().toISOString().slice(0,10)}">
        </div>
        <div class="form-group">
          <label>How was it?</label>
          <div class="star-picker" id="h-rating"></div>
        </div>
        <div class="form-group">
          <label>Summary</label>
          <textarea id="h-summary" placeholder="How did the trip go?"></textarea>
        </div>
        <div class="status-msg" id="h-save-status"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="h-cancel">Cancel</button>
        <button class="btn btn-primary" id="h-save">Save Entry</button>
      </div>
    </div>
  `);
  const destSel = modal.querySelector('#h-dest');
  DATA.destinations.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.id; opt.textContent = d.name || 'Untitled';
    if(preselectDestId === d.id) opt.selected = true;
    destSel.appendChild(opt);
  });
  renderStarPicker(modal.querySelector('#h-rating'), 0, (v) => { ratingValue = v; });

  function close(){ closeModal(); }
  modal.querySelector('.modal-close').onclick = close;
  modal.querySelector('#h-cancel').onclick = close;
  backdrop.addEventListener('click', (e) => { if(e.target === backdrop) close(); });

  modal.querySelector('#h-save').onclick = () => {
    const date = modal.querySelector('#h-date').value;
    const saveStatus = modal.querySelector('#h-save-status');
    if(!date){
      saveStatus.textContent = 'Please choose a date.';
      saveStatus.className = 'status-msg err';
      modal.querySelector('#h-date').focus();
      return;
    }
    if(ratingValue === 0){
      saveStatus.textContent = 'Please give a star rating.';
      saveStatus.className = 'status-msg err';
      return;
    }
    const entry = {
      id: uid(),
      destinationId: destSel.value,
      date,
      rating: ratingValue,
      summary: modal.querySelector('#h-summary').value
    };
    DATA.history.push(entry);
    const dest = DATA.destinations.find(d => d.id === destSel.value);
    if(dest) dest.visited = true;
    saveData();
    closeModal();
    render();
  };

  backdrop.appendChild(modal);
  openModal(backdrop);
}

/* ============================================================
   INIT
   ============================================================ */
render();
</script>
