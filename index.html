<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Ranker</title>
<link rel="apple-touch-icon" sizes="180x180" href="/artifacts/images/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/artifacts/images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/artifacts/images/favicon-16x16.png">
<link rel="manifest" href="/artifacts/images/site.webmanifest">
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface-alt: #fbfbfd;
    --border: #e2e2e6;
    --text: #1d1d1f;
    --text-secondary: #86868b;
    --accent: #0071e3;
    --accent-soft: #e8f2fe;
    --danger: #ff3b30;
    --radius: 14px;
    --radius-sm: 9px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 6px 20px rgba(0,0,0,0.08);
    --shadow-lg: 0 20px 50px rgba(0,0,0,0.16);

    --tier-s: #ff375f;
    --tier-a: #ff9f0a;
    --tier-b: #ffd60a;
    --tier-c: #30d158;
    --tier-d: #64d2ff;
    --tier-f: #8e8e93;

    --status-planning: #64d2ff;
    --status-in-progress: #ff9f0a;
    --status-completed: #30d158;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, h4 { margin: 0; letter-spacing: -0.02em; font-weight: 600; }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    background: none;
    color: inherit;
  }
  button:focus-visible,
  input:focus-visible,
  select:focus-visible,
  textarea:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  input, select, textarea {
    font-family: inherit;
    font-size: 15px;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #d2d2d7; border-radius: 4px; }

  /* ---------- App Shell ---------- */
  #app {
    display: flex;
    min-height: 100vh;
  }

  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--surface-alt);
    border-right: 1px solid var(--border);
    padding: 24px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .brand {
    font-size: 19px;
    font-weight: 700;
    padding: 0 12px 22px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
  }
  .brand .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); display: inline-block; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 14.5px;
    font-weight: 500;
    color: var(--text-secondary);
    transition: background 0.15s ease, color 0.15s ease;
    text-align: left;
    width: 100%;
  }
  .nav-item:hover { background: rgba(0,0,0,0.04); color: var(--text); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent); }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

  .nav-spacer { flex: 1; }

  main {
    flex: 1;
    padding: 32px 40px 90px 40px;
    max-width: 1180px;
    width: 100%;
    margin: 0 auto;
  }

  .view-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .view-header h1 { font-size: 28px; }
  .view-header p { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }

  /* Bottom tab bar for narrow screens */
  .tabbar {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(251,251,253,0.92);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 6px 4px calc(6px + env(safe-area-inset-bottom));
    justify-content: space-around;
    z-index: 40;
  }
  .tabbar button {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    font-size: 10.5px;
    color: var(--text-secondary);
    padding: 4px 8px;
    border-radius: 10px;
    flex: 1;
  }
  .tabbar button.active { color: var(--accent); }
  .tabbar svg { width: 21px; height: 21px; }

  @media (max-width: 860px) {
    .sidebar { display: none; }
    .tabbar { display: flex; }
    main { padding: 20px 16px 84px 16px; }
  }

  /* ---------- Cards ---------- */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
  }

  .dest-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    cursor: grab;
    width: 148px;
    flex-shrink: 0;
    transition: box-shadow 0.18s ease, transform 0.18s ease;
    border: 1px solid var(--border);
    position: relative;
  }
  .dest-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .dest-card.dragging { opacity: 0.4; }
  .dest-card .thumb {
    width: 100%;
    height: 100px;
    background: linear-gradient(135deg, #e5e5ea, #f2f2f4);
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #b0b0b6;
    font-size: 26px;
  }
  .dest-card .info { padding: 9px 10px 11px 10px; }
  .dest-card .name {
    font-size: 13.5px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .dest-card .distance {
    font-size: 11px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .dest-card .meta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 5px;
  }
  .season-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
    background: var(--accent-soft);
    color: var(--accent);
  }
  .cost-dots { display: flex; gap: 2px; }
  .cost-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--border); }
  .cost-dots span.filled { background: #ffb100; }

  .visited-badge {
    position: absolute;
    top: 7px;
    right: 7px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(255,255,255,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .visited-badge svg { width: 12px; height: 12px; color: #30d158; }

  .rank-badge {
    position: absolute;
    top: 7px;
    left: 7px;
    min-width: 20px;
    height: 20px;
    padding: 0 5px;
    border-radius: 10px;
    background: rgba(29,29,31,0.82);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }
  .tier-pos-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 20px;
    background: var(--bg);
    color: var(--text-secondary);
    white-space: nowrap;
  }

  .card-delete-btn {
    position: absolute;
    top: 74px;
    right: 7px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(29,29,31,0.72);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s ease, background 0.15s ease;
    z-index: 2;
  }
  .card-delete-btn svg { width: 12px; height: 12px; }
  .card-delete-btn:hover { background: var(--danger); }
  .dest-card:hover .card-delete-btn { opacity: 1; }
  @media (hover: none) { .card-delete-btn { opacity: 1; background: rgba(29,29,31,0.55); } }

  .rank-controls {
    border-top: 1px solid var(--border);
    padding: 8px;
    display: grid;
    grid-template-columns: 1fr 26px 26px;
    gap: 5px;
    align-items: center;
    background: var(--surface-alt);
  }
  .rank-controls select {
    min-width: 0;
    padding: 5px 6px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: var(--surface);
    font-size: 12px;
  }
  .rank-controls button {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 700;
  }
  .rank-controls button:hover { color: var(--accent); border-color: var(--accent); }
  .rank-controls button:disabled { opacity: 0.35; cursor: default; }

  /* ---------- Tier List ---------- */
  .tier-row {
    display: flex;
    margin-bottom: 14px;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
  }
  .tier-label {
    width: 64px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: white;
  }
  .tier-drop {
    flex: 1;
    background: var(--surface);
    padding: 12px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    min-height: 132px;
    align-items: flex-start;
    transition: background 0.15s ease;
  }
  .tier-drop.drag-over { background: var(--accent-soft); }
  .tier-drop.empty::before {
    content: "Drop destinations here";
    color: #c7c7cc;
    font-size: 13px;
    align-self: center;
    margin: auto;
  }

  .unranked-section {
    margin-top: 30px;
  }
  .unranked-section h3 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-secondary);
    margin-bottom: 10px;
  }
  .unranked-drop {
    background: var(--surface-alt);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    min-height: 132px;
  }
  .unranked-drop.drag-over { background: var(--accent-soft); }

  /* ---------- Empty States ---------- */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 10px; }
  .empty-state h3 { color: var(--text); margin-bottom: 6px; font-size: 17px; }
  .empty-state p { font-size: 14px; max-width: 320px; margin: 0 auto; }
  .empty-state button {
    margin-top: 16px;
    background: var(--accent);
    color: white;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
  }

  /* ---------- Trip Matcher ---------- */
  .matcher-picker {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .matcher-picker select {
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    min-width: 240px;
  }
  .match-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
  }
  .match-row .rank {
    font-weight: 700;
    color: var(--text-secondary);
    width: 22px;
    text-align: center;
    font-size: 14px;
  }
  .match-row .thumb-sm {
    width: 46px; height: 46px; border-radius: 10px;
    background-size: cover; background-position: center;
    background: linear-gradient(135deg, #e5e5ea, #f2f2f4);
    flex-shrink: 0;
  }
  .match-row .details { flex: 1; min-width: 0; }
  .match-row .details .name { font-weight: 600; font-size: 14.5px; }
  .match-row .details .sub { font-size: 12.5px; color: var(--text-secondary); margin-top: 2px; }
  .match-score-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; width: 90px; flex-shrink: 0; }
  .match-score-bar { width: 90px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .match-score-bar .fill { height: 100%; background: var(--accent); border-radius: 3px; }
  .match-score-num { font-size: 13px; font-weight: 700; color: var(--accent); }

  /* ---------- History ---------- */
  .history-entry {
    display: flex;
    gap: 14px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    align-items: center;
  }
  .history-entry .thumb-sm {
    width: 54px; height: 54px; border-radius: 10px;
    background-size: cover; background-position: center;
    background: linear-gradient(135deg, #e5e5ea, #f2f2f4);
    flex-shrink: 0;
  }
  .history-entry .body { flex: 1; min-width: 0; }
  .history-entry .top-line { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; }
  .history-entry .name { font-weight: 600; font-size: 15px; }
  .history-entry .date { font-size: 12.5px; color: var(--text-secondary); white-space: nowrap; }
  .history-entry .summary { font-size: 13.5px; color: var(--text-secondary); margin-top: 4px; }
  .stars { color: #ffb100; font-size: 12.5px; letter-spacing: 1px; margin-top: 3px; }

  .icon-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
    flex-shrink: 0;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .icon-btn:hover { background: #fdeceb; color: var(--danger); }
  .icon-btn svg { width: 15px; height: 15px; }

  .fab {
    position: fixed;
    bottom: 28px;
    right: 32px;
    width: 54px; height: 54px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-lg);
    font-size: 26px;
    z-index: 30;
    transition: transform 0.15s ease;
  }
  .fab:hover { transform: scale(1.06); }
  @media (max-width: 860px) { .fab { bottom: 78px; right: 18px; width: 50px; height: 50px; } }


  .timeline-wrap {
    overflow-x: auto;
    padding-bottom: 18px;
    -webkit-overflow-scrolling: touch;
  }
  .timeline-track {
    display: flex;
    align-items: flex-start;
    gap: 0;
    position: relative;
    padding: 40px 20px 10px 20px;
    min-height: 220px;
  }
  .timeline-track::before {
    content: '';
    position: absolute;
    top: 68px;
    left: 20px;
    right: 20px;
    height: 2px;
    background: var(--border);
  }
  .timeline-item {
    flex: 0 0 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    padding: 0 10px;
  }
  .timeline-date {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    white-space: nowrap;
    margin-bottom: 10px;
  }
  .timeline-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--surface);
    box-shadow: 0 0 0 2px var(--accent);
    margin-bottom: 14px;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }
  .timeline-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    width: 160px;
    overflow: hidden;
    transition: box-shadow 0.18s ease, transform 0.18s ease;
  }
  .timeline-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .timeline-thumb {
    width: 100%; height: 90px;
    background-size: cover; background-position: center;
    background: linear-gradient(135deg, #e5e5ea, #f2f2f4);
  }
  .timeline-info { padding: 9px 10px 11px 10px; }
  .timeline-name {
    font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .timeline-stars { color: #ffb100; font-size: 11px; letter-spacing: 1px; margin-top: 4px; }
  @media (max-width: 860px) {
    .timeline-item { flex: 0 0 140px; }
    .timeline-card { width: 120px; }
    .timeline-thumb { height: 70px; }
  }

  /* ---------- Trips ---------- */
  .trips-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .trip-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    padding: 16px 18px 18px;
    cursor: pointer;
    transition: box-shadow 0.18s ease, transform 0.18s ease;
  }
  .trip-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .trip-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .trip-status-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
    color: #fff;
  }
  .trip-status-badge.status-planning { background: var(--status-planning); }
  .trip-status-badge.status-in-progress { background: var(--status-in-progress); }
  .trip-status-badge.status-completed { background: var(--status-completed); }
  .trip-name { font-size: 17px; margin-bottom: 3px; }
  .trip-dates { font-size: 12.5px; color: var(--text-secondary); margin-bottom: 12px; }
  .trip-thumbs { display: flex; align-items: center; gap: 6px; min-height: 34px; flex-wrap: wrap; }
  .trip-thumb {
    width: 34px; height: 34px; border-radius: 9px;
    background-size: cover; background-position: center;
    background-color: var(--bg);
    background: linear-gradient(135deg, #e5e5ea, #f2f2f4);
    flex-shrink: 0;
  }
  .trip-thumb-more {
    width: 34px; height: 34px; border-radius: 9px;
    background: var(--bg);
    color: var(--text-secondary);
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .trip-no-stops { font-size: 12.5px; color: var(--text-secondary); }
  .trip-progress { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
  .trip-progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .trip-progress-bar .fill { height: 100%; background: var(--accent); border-radius: 3px; }
  .trip-progress-label { font-size: 11.5px; color: var(--text-secondary); white-space: nowrap; }

  .status-stepper { display: flex; align-items: center; }
  .status-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 600;
    flex: 0 0 auto;
    padding: 2px 4px;
  }
  .status-step .step-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--border);
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .status-step.done .step-dot { background: var(--accent); border-color: var(--accent); }
  .status-step.active .step-dot { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .status-step.active { color: var(--accent); }
  .step-line { flex: 1 1 24px; height: 2px; background: var(--border); margin: 0 2px 18px; }
  .step-line.done { background: var(--accent); }

  .trip-stops { display: flex; flex-direction: column; gap: 8px; }
  .trip-stop-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .trip-stop-num {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .trip-stop-thumb {
    width: 32px; height: 32px; border-radius: 8px;
    background-size: cover; background-position: center;
    background: linear-gradient(135deg, #e5e5ea, #f2f2f4);
    flex-shrink: 0;
  }
  .trip-stop-name { flex: 1; font-size: 13.5px; font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .trip-stop-actions { display: flex; gap: 2px; flex-shrink: 0; }
  .trip-stop-actions .icon-btn { width: 26px; height: 26px; }
  .trip-stop-actions .icon-btn:disabled { opacity: 0.3; cursor: default; }
  .trip-stop-actions .icon-btn:disabled:hover { background: none; color: var(--text-secondary); }
  .trip-empty-hint { font-size: 13px; color: var(--text-secondary); }

  .checklist-item {
    display: flex;
    align-items: center;
    justify-content: space-between;

<body>
<div id="app"></div>

<script>
/* ============================================================
   DATA LAYER
   ============================================================ */
const STORAGE_KEY = 'travel_ranker_data_v1';
const TIERS = ['S','A','B','C','D','F'];
const SEASONS = ['Spring','Summer','Fall','Winter','Year-round'];
const RATING_CATEGORIES = [
  {key:'food', label:'Food'},
  {key:'weather', label:'Weather'},
  {key:'entertainment', label:'Entertainment'},
  {key:'culture', label:'Culture'},
  {key:'relaxation', label:'Relaxation'}
];
const TRIP_STATUSES = ['Planning', 'In Progress', 'Completed'];

function uid(){ return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8); }

function defaultData(){
  return {
    destinations: [],
    history: [],
    trips: [],
    settings: { homeLocation: { name: '', lat: null, long: null }, unit: 'km' }
  };
}

let DATA = loadData();

function loadData(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultData();
    const parsed = JSON.parse(raw);
    // Ensure shape integrity across versions
    const d = defaultData();
    const result = Object.assign(d, parsed, {
      destinations: parsed.destinations || [],
      history: parsed.history || [],
      trips: parsed.trips || [],
      settings: Object.assign(d.settings, parsed.settings || {})
    });
    result.destinations.forEach((dest, i) => {
      if(typeof dest.order !== 'number') dest.order = i;
    });
    result.trips.forEach(trip => {
      if(!Array.isArray(trip.destinationIds)) trip.destinationIds = [];
      if(!Array.isArray(trip.checklist)) trip.checklist = [];
      if(!trip.status) trip.status = 'Planning';
    });
    return result;
  } catch(e){
    console.error('Failed to load data', e);
    return defaultData();
  }
}

function saveData(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
  } catch(e){
    console.error('Failed to save data', e);
    alert('Could not save your data. Storage may be full. Try removing an image or two, or exporting a backup.');
  }
}

/* ============================================================
   GEO UTILITIES
   ============================================================ */
function haversineKm(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}
function kmToMiles(km){ return km * 0.621371; }
function formatDistance(km){
  const unit = DATA.settings.unit;
  if(unit === 'mi') return Math.round(kmToMiles(km)).toLocaleString() + ' mi';
  return Math.round(km).toLocaleString() + ' km';
}

function distanceLabel(dest){
  const home = DATA.settings.homeLocation;
  if(home.lat == null || home.long == null) return 'Set home location';
  if(dest.location.lat == null || dest.location.long == null) return 'No coordinates set';
  const km = haversineKm(home.lat, home.long, dest.location.lat, dest.location.long);
  return formatDistance(km) + ' from home';
}

async function geocodeLocation(name){
  const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(name);
  const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
  if(!res.ok) throw new Error('Geocoding request failed');
  const data = await res.json();
  if(!data || !data.length) throw new Error('Location not found');
  return { lat: parseFloat(data[0].lat), long: parseFloat(data[0].lon) };
}

/* ============================================================
   IMAGE HANDLING
   ============================================================ */
function resizeImageFile(file, maxDim=1200, quality=0.82){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if(width > maxDim || height > maxDim){
          if(width > height){ height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ============================================================
   APP STATE / ROUTER
   ============================================================ */
let currentView = 'tierlist';
let modalStack = [];
let modalFocusStack = [];
function safeGetItem(key, fallback){
  try { return localStorage.getItem(key) ?? fallback; }
  catch(e){ return fallback; }
}
function safeSetItem(key, value){
  try { localStorage.setItem(key, value); }
  catch(e){ /* storage unavailable, ignore */ }
}
let sidebarCollapsed = safeGetItem('travel_ranker_sidebar_collapsed', 'false') === 'true';
let tierListViewMode = safeGetItem('travel_ranker_tierlist_view', 'grid'); // 'grid' | 'list'

function setView(v){
  currentView = v;
  render();
}

function toggleSidebar(){
  sidebarCollapsed = !sidebarCollapsed;
  safeSetItem('travel_ranker_sidebar_collapsed', sidebarCollapsed);
  render();
}

function setTierListViewMode(mode){
  tierListViewMode = mode;
  safeSetItem('travel_ranker_tierlist_view', mode);
  render();
}

function openModal(node){
  const active = document.activeElement instanceof HTMLElement ? document.activeElement : null;
  modalFocusStack.push(active);
  node.setAttribute('role', 'dialog');
  node.setAttribute('aria-modal', 'true');
  const dialogTitle = node.querySelector('h2, h3');
  if(dialogTitle && !dialogTitle.id) dialogTitle.id = 'modal-title-' + uid();
  if(dialogTitle) node.setAttribute('aria-labelledby', dialogTitle.id);
  modalStack.push(node);
  render();
  requestAnimationFrame(() => {
    const firstFocus = node.querySelector('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
    if(firstFocus) firstFocus.focus();
  });
}
function closeModal(){
  modalStack.pop();
  const previousFocus = modalFocusStack.pop();
  render();
  if(previousFocus && document.contains(previousFocus)){
    requestAnimationFrame(() => previousFocus.focus());
  }
}
function closeAllModals(){
  modalStack = [];
  modalFocusStack = [];
  render();
}

document.addEventListener('keydown', (e) => {
  if(!modalStack.length) return;
  const topModal = modalStack[modalStack.length - 1];
  if(e.key === 'Escape'){
    e.preventDefault();
    closeModal();
    return;
  }
  if(e.key !== 'Tab') return;
  const focusable = Array.from(topModal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'))
    .filter(el => !el.disabled && el.offsetParent !== null);
  if(!focusable.length) return;
  const first = focusable[0];
  const last = focusable[focusable.length - 1];
  if(e.shiftKey && document.activeElement === first){
    e.preventDefault();
    last.focus();
  } else if(!e.shiftKey && document.activeElement === last){
    e.preventDefault();
    first.focus();
  }
});

/* ============================================================

const ICONS = {

  trash: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M9 7V4.5A1.5 1.5 0 0 1 10.5 3h3A1.5 1.5 0 0 1 15 4.5V7"/><path d="M6.5 7 7.3 19.5A1.5 1.5 0 0 0 8.8 21h6.4a1.5 1.5 0 0 0 1.5-1.5L17.5 7"/><path d="M10 11v6M14 11v6"/></svg>`,
  chevron: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 6 9 12 15 18"/></svg>`,
  list: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`
};

/* ============================================================
   RENDER: SHELL
   ============================================================ */
function el(html){
  const t = document.createElement('template');
  t.innerHTML = html.trim();
  return t.content.firstElementChild;
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';

  const sidebar = el(`
    <div class="sidebar ${sidebarCollapsed ? 'collapsed' : ''}">
      <div class="sidebar-toggle-row">
        <button class="sidebar-toggle-btn" id="sidebar-toggle" title="${sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'}">${ICONS.chevron}</button>
      </div>
      <div class="brand"><span class="dot"></span><span class="brand-text">Travel Ranker</span></div>
      ${navItem('tierlist', ICONS.tier, 'Tier List')}
      ${navItem('matcher', ICONS.matcher, 'Trip Matcher')}
      ${navItem('trips', ICONS.trips, 'Trips')}
      ${navItem('history', ICONS.history, 'History')}
      <div class="nav-spacer"></div>
      ${navItem('settings', ICONS.settings, 'Settings')}
    </div>
  `);
  sidebar.querySelector('#sidebar-toggle').onclick = toggleSidebar;
  app.appendChild(sidebar);

  const main = el(`<main></main>`);
  main.appendChild(renderCurrentView());
  app.appendChild(main);

  const tabbar = el(`
    <div class="tabbar">
      ${tabItem('tierlist', ICONS.tier, 'Tiers')}
      ${tabItem('matcher', ICONS.matcher, 'Match')}
      ${tabItem('trips', ICONS.trips, 'Trips')}
      ${tabItem('history', ICONS.history, 'History')}
      ${tabItem('settings', ICONS.settings, 'Settings')}

  `);

  modalStack.forEach(node => app.appendChild(node));
}

function navItem(view, icon, label){
  return `<button class="nav-item ${currentView===view?'active':''}" data-view="${view}" title="${label}">${icon}<span class="nav-label">${label}</span></button>`;
}
function tabItem(view, icon, label){
  return `<button class="${currentView===view?'active':''}" data-view="${view}">${icon}<span>${label}</span></button>`;
}
function fabConfig(){
  if(currentView === 'trips') return { title: 'Plan a trip', onClick: () => openTripModal() };

}

/* ============================================================
   DESTINATION CARD
   ============================================================ */
function destCardEl(dest, ranks){
  const showRanks = ranks && ranks.tierPos != null;
  const tier = dest.tier || 'unranked';
  const card = el(`
    <div class="dest-card" draggable="true" data-id="${dest.id}">
      ${showRanks ? `<div class="rank-badge" title="Overall rank across the whole tier list">#${ranks.overallRank}</div>` : ''}
      <div class="thumb" style="${dest.image ? `background-image:url(${dest.image})` : ''}">${dest.image ? '' : '🌍'}</div>
      <div class="info">
        <div class="name">${escapeHtml(dest.name || 'Untitled')}</div>
        <div class="distance">${distanceLabel(dest)}</div>
        <div class="meta-row">
          <div style="display:flex;align-items:center;gap:5px;min-width:0;">
            <span class="season-badge">${dest.season || '-'}</span>
            ${showRanks ? `<span class="tier-pos-badge" title="Position within this tier, left to right">#${ranks.tierPos}</span>` : ''}
          </div>
          <span class="cost-dots">${costDots(dest.cost)}</span>
        </div>
      </div>
      ${dest.visited ? `<div class="visited-badge">${ICONS.check}</div>` : ''}
      <button class="card-delete-btn" title="Delete destination" data-delete-id="${dest.id}">${ICONS.trash}</button>
      <div class="rank-controls" aria-label="Rank controls for ${escapeHtml(dest.name || 'Untitled')}">
        <select data-tier-select aria-label="Move ${escapeHtml(dest.name || 'destination')} to tier">
          ${tierOptions(tier)}
        </select>
        <button type="button" data-rank-move="up" title="Move up" aria-label="Move up" ${isFirstInTier(dest) ? 'disabled' : ''}>↑</button>
        <button type="button" data-rank-move="down" title="Move down" aria-label="Move down" ${isLastInTier(dest) ? 'disabled' : ''}>↓</button>
      </div>
    </div>
  `);
  card.addEventListener('click', (e) => {
    if(e.target.closest('[data-delete-id], .rank-controls')) return;
    openDetailModal(dest.id);
  });
  card.querySelector('[data-delete-id]').addEventListener('click', (e) => {
    e.stopPropagation();
    confirmDeleteDestination(dest.id);
  });
  card.addEventListener('dragstart', (e) => {
    e.dataTransfer.setData('text/plain', dest.id);
    card.classList.add('dragging');
  });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));
  card.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); });
  card.addEventListener('drop', (e) => {
    e.preventDefault();
    e.stopPropagation();
    const draggedId = e.dataTransfer.getData('text/plain');
    if(!draggedId || draggedId === dest.id) return;
    const zone = card.closest('[data-tier]');
    if(!zone) return;
    const tier = zone.getAttribute('data-tier');
    const rect = card.getBoundingClientRect();
    const insertAfter = (e.clientX - rect.left) > rect.width / 2;
    reorderWithinTier(draggedId, tier, dest.id, insertAfter);
  });
  card.querySelector('[data-tier-select]').onchange = (e) => {
    e.stopPropagation();
    moveDestinationToTier(dest.id, e.target.value);
  };
  card.querySelectorAll('[data-rank-move]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      moveDestinationWithinTier(dest.id, btn.getAttribute('data-rank-move'));
    };
  });
  return card;
}

function tierGroup(tier){
  return DATA.destinations.filter(d => {
    const dTier = d.tier || 'unranked';
    return dTier === tier;
  });
}

function nextOrderFor(tier){
  const group = tierGroup(tier);
  return group.length ? Math.max(...group.map(d => d.order || 0)) + 1 : 0;
}

function tierOptions(currentTier){
  const options = ['unranked', ...TIERS];
  return options.map(tier => {
    const label = tier === 'unranked' ? 'Unranked' : `Tier ${tier}`;
    return `<option value="${tier}" ${tier === currentTier ? 'selected' : ''}>${label}</option>`;
  }).join('');
}

function sortedTierGroup(tier){
  return tierGroup(tier).sort((a,b) => (a.order || 0) - (b.order || 0));
}

function isFirstInTier(dest){
  const group = sortedTierGroup(dest.tier || 'unranked');
  return group.length <= 1 || group[0].id === dest.id;
}

function isLastInTier(dest){
  const group = sortedTierGroup(dest.tier || 'unranked');
  return group.length <= 1 || group[group.length - 1].id === dest.id;
}

function normalizeTierOrder(tier){
  sortedTierGroup(tier).forEach((d, i) => { d.order = i; });
}

function moveDestinationToTier(destId, tier){
  const dest = DATA.destinations.find(d => d.id === destId);
  if(!dest) return;
  const oldTier = dest.tier || 'unranked';
  if(oldTier === tier) return;
  const newOrder = nextOrderFor(tier);
  dest.tier = tier;
  dest.order = newOrder;
  normalizeTierOrder(oldTier);
  normalizeTierOrder(tier);
  saveData();
  render();
}

function moveDestinationWithinTier(destId, direction){
  const dest = DATA.destinations.find(d => d.id === destId);
  if(!dest) return;
  const tier = dest.tier || 'unranked';
  const group = sortedTierGroup(tier);
  const idx = group.findIndex(d => d.id === destId);
  if(idx === -1) return;
  const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
  if(swapIdx < 0 || swapIdx >= group.length) return;
  [group[idx], group[swapIdx]] = [group[swapIdx], group[idx]];
  group.forEach((d, i) => { d.order = i; });
  saveData();
  render();
}

function reorderWithinTier(draggedId, tier, targetId, insertAfter){
  const dragged = DATA.destinations.find(d => d.id === draggedId);
  if(!dragged) return;
  const group = tierGroup(tier).filter(d => d.id !== draggedId).sort((a,b) => a.order - b.order);
  let idx = group.findIndex(d => d.id === targetId);
  if(idx === -1) idx = group.length;
  else if(insertAfter) idx += 1;
  group.splice(idx, 0, dragged);
  group.forEach((d, i) => { d.order = i; });
  dragged.tier = tier;
  saveData();
  render();
}

function confirmDeleteDestination(destId){
  const dest = DATA.destinations.find(d => d.id === destId);
  if(!dest) return;
  openConfirm(
    'Delete this destination?',
    `This will permanently remove "${dest.name || 'this destination'}" and any linked history entries. This cannot be undone.`,
    () => {
      DATA.destinations = DATA.destinations.filter(d => d.id !== destId);
      DATA.history = DATA.history.filter(h => h.destinationId !== destId);
      saveData();
      closeAllModals();
    },
    'Delete Destination'
  );
}

function costDots(cost){
  let out = '';
  for(let i=1;i<=5;i++){ out += `<span class="${i<=cost?'filled':''}"></span>`; }
  return out;
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

let tierListSortKey = 'rank';

      </select>
    </div>
  `);
  sortRow.querySelector('#tlv-sort').onchange = (e) => { tierListSortKey = e.target.value; render(); };
  wrap.appendChild(sortRow);

  const tierOrderIndex = { S:0, A:1, B:2, C:3, D:4, F:5, unranked:6 };
  const ranked = [];
  let overallCounter = 0;
  TIERS.forEach(tier => {
    tierGroup(tier).sort((a,b) => a.order - b.order).forEach((d, i) => {
      overallCounter += 1;
      ranked.push({ dest: d, overallRank: overallCounter, tierPos: i + 1 });
    });
  });

    sorted.sort((a,b) => {
      const ta = tierOrderIndex[a.dest.tier || 'unranked'];
      const tb = tierOrderIndex[b.dest.tier || 'unranked'];
      return ta - tb || (a.tierPos ?? 0) - (b.tierPos ?? 0);
    });
  }
  // 'rank' uses the default order already built above

  const table = el('<div class="tier-list-view-table"></div>');
  sorted.forEach(({ dest, overallRank, tierPos }) => {
    const tier = dest.tier && dest.tier !== 'unranked' ? dest.tier : null;
    const row = el(`
      <div class="tier-list-view-row" data-id="${dest.id}">
        <span class="tlv-rank">${overallRank ? '#' + overallRank : '-'}</span>
        <div class="tlv-tier" style="background:${tier ? TIER_COLORS[tier] : 'var(--tier-f)'}">${tier || '-'}</div>
        <div class="tlv-thumb" style="${dest.image ? `background-image:url(${dest.image})` : ''}"></div>
        <span class="tlv-name">${escapeHtml(dest.name || 'Untitled')}</span>
        <div class="tlv-meta">
          <span class="season-badge">${dest.season || '-'}</span>
          <span class="cost-dots">${costDots(dest.cost)}</span>
          <span class="tlv-dist">${distanceLabel(dest)}</span>
        </div>
        <div class="tlv-actions" aria-label="Rank controls for ${escapeHtml(dest.name || 'Untitled')}">
          <select data-tier-select aria-label="Move ${escapeHtml(dest.name || 'destination')} to tier">
            ${tierOptions(dest.tier || 'unranked')}
          </select>
          <button type="button" data-rank-move="up" title="Move up" aria-label="Move up" ${isFirstInTier(dest) ? 'disabled' : ''}>↑</button>
          <button type="button" data-rank-move="down" title="Move down" aria-label="Move down" ${isLastInTier(dest) ? 'disabled' : ''}>↓</button>
        </div>
      </div>
    `);
    row.onclick = (e) => {
      if(e.target.closest('.tlv-actions')) return;
      openDetailModal(dest.id);
    };
    row.querySelector('[data-tier-select]').onchange = (e) => {
      e.stopPropagation();
      moveDestinationToTier(dest.id, e.target.value);

    row.querySelectorAll('[data-rank-move]').forEach(btn => {
      btn.onclick = (e) => {

        moveDestinationWithinTier(dest.id, btn.getAttribute('data-rank-move'));

  return wrap;

function attachDropZone(zone, tier){
  zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const id = e.dataTransfer.getData('text/plain');
    const dest = DATA.destinations.find(d => d.id === id);
    if(dest){
      const group = tierGroup(tier).filter(d => d.id !== id);
      const maxOrder = group.length ? Math.max(...group.map(d => d.order || 0)) : -1;
      dest.tier = tier;
      dest.order = maxOrder + 1;
      saveData();
      render();
    }
  });
}

/* ============================================================
   TRIP MATCHER VIEW
   ============================================================ */
let matcherBaseId = null;
let historyViewMode = 'list'; // 'list' | 'timeline'
const MATCH_DISTANCE_HALF_SCORE_KM = 8000;
const MATCH_DISTANCE_DECAY_POWER = 2;

function renderMatcherView(){
  const wrap = el(`<div></div>`);
  wrap.appendChild(el(`
    <div class="view-header">
      <div><h1>Trip Matcher</h1><p>Find destinations that pair well with a home base for your trip.</p></div>
    </div>
  `));

  if(DATA.destinations.length < 2){
    wrap.appendChild(emptyState('🧭', 'Add more destinations', 'You need at least two destinations with coordinates to find pairings.', DATA.destinations.length===0?'Add Destination':null, () => openAddEditModal()));
    return wrap;
  }

  if(!matcherBaseId || !DATA.destinations.find(d=>d.id===matcherBaseId)){
    matcherBaseId = DATA.destinations[0].id;
  }

  const picker = el(`
    <div class="matcher-picker">
      <select id="matcher-select"></select>
    </div>
  `);
  const select = picker.querySelector('select');
  DATA.destinations.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.id;
    opt.textContent = d.name || 'Untitled';
    if(d.id === matcherBaseId) opt.selected = true;
    select.appendChild(opt);
  });
  select.onchange = () => { matcherBaseId = select.value; render(); };
  wrap.appendChild(picker);

  const base = DATA.destinations.find(d => d.id === matcherBaseId);
  const others = DATA.destinations.filter(d => d.id !== matcherBaseId);

  if(base.location.lat == null || base.location.long == null){
    wrap.appendChild(el(`<p style="color:var(--text-secondary);font-size:13.5px;">This destination has no coordinates set yet. Edit it and add a location to see matches.</p>`));
    return wrap;
  }

  const scored = others.map(d => {
    if(d.location.lat == null || d.location.long == null){
      return { dest: d, score: null, distKm: null };
    }
    const distKm = haversineKm(base.location.lat, base.location.long, d.location.lat, d.location.long);
    // Distance decay: an inverse-power curve keeps close matches high and compounds long-haul friction.
    const distScore = distanceDecayScore(distKm);
    const seasonScore = seasonMatchScore(base.season, d.season);
    const matchScore = (distScore * 0.85 + seasonScore * 0.15) * 100;
    return { dest: d, score: matchScore, distKm };
  }).sort((a,b) => (b.score ?? -1) - (a.score ?? -1));

  const list = el('<div></div>');
  scored.forEach((s, i) => {
    if(s.score === null){
      list.appendChild(el(`
        <div class="match-row" style="opacity:0.55">
          <div class="rank">${i+1}</div>
          <div class="thumb-sm" style="${s.dest.image?`background-image:url(${s.dest.image})`:''}"></div>
          <div class="details">
            <div class="name">${escapeHtml(s.dest.name)}</div>
            <div class="sub">No coordinates set, can't compute match</div>
          </div>
        </div>
      `));
      return;
    }
    const row = el(`
      <div class="match-row">
        <div class="rank">${i+1}</div>
        <div class="thumb-sm" style="${s.dest.image?`background-image:url(${s.dest.image})`:''}"></div>
        <div class="details">
          <div class="name">${escapeHtml(s.dest.name)}</div>
          <div class="sub">${formatDistance(s.distKm)} away · ${base.season || '-'} vs ${s.dest.season || '-'}</div>
        </div>
        <div class="match-score-wrap">
          <div class="match-score-num">${Math.round(s.score)}%</div>
          <div class="match-score-bar"><div class="fill" style="width:${Math.round(s.score)}%"></div></div>
        </div>
      </div>
    `);
    row.style.cursor = 'pointer';
    row.onclick = () => openDetailModal(s.dest.id);
    list.appendChild(row);
  });
  wrap.appendChild(list);

  return wrap;
}

function distanceDecayScore(distKm){
  return 1 / (1 + Math.pow(distKm / MATCH_DISTANCE_HALF_SCORE_KM, MATCH_DISTANCE_DECAY_POWER));
}

function seasonMatchScore(a, b){
  if(!a || !b) return 0;
  if(a === b) return 1;
  if(a === 'Year-round' || b === 'Year-round') return 1;

  const orderedSeasons = ['Spring', 'Summer', 'Fall', 'Winter'];
  const aIndex = orderedSeasons.indexOf(a);
  const bIndex = orderedSeasons.indexOf(b);
  if(aIndex === -1 || bIndex === -1) return 0;

  const distance = Math.abs(aIndex - bIndex);
  const seasonalGap = Math.min(distance, orderedSeasons.length - distance);
  if(seasonalGap === 1) return 0.6;
  return 0;
}

function renderTripsView(){
  const wrap = el(`<div></div>`);
  wrap.appendChild(el(`
    <div class="view-header">
      <div><h1>Trips</h1><p>Group destinations into a plan, set dates, and track progress.</p></div>
    </div>
  `));

  if(DATA.trips.length === 0){
    wrap.appendChild(emptyState('🧳', 'No trips planned yet', 'Combine destinations into a single plan, add dates and a checklist, then track it from planning to done.', 'Plan a Trip', () => openTripModal()));
    return wrap;
  }

  const grid = el('<div class="trips-grid"></div>');
  const sorted = [...DATA.trips].sort((a,b) => {
    const aKey = a.startDate || '9999-99-99';
    const bKey = b.startDate || '9999-99-99';
    return aKey.localeCompare(bKey) || (a.name || '').localeCompare(b.name || '');

function statusSlug(status){
  return (status || 'Planning').toLowerCase().replace(/\s+/g, '-');
}

function tripDateRange(trip){
  if(trip.startDate && trip.endDate) return `${formatDate(trip.startDate)} to ${formatDate(trip.endDate)}`;
  if(trip.startDate) return `Starts ${formatDate(trip.startDate)}`;
  if(trip.endDate) return `Ends ${formatDate(trip.endDate)}`;
  return '';
}

function tripCardEl(trip){
  const stops = (trip.destinationIds || []).map(id => DATA.destinations.find(d => d.id === id)).filter(Boolean);
  const checklist = trip.checklist || [];
  const doneCount = checklist.filter(c => c.done).length;
  const pct = checklist.length ? Math.round((doneCount / checklist.length) * 100) : 0;
  const dateRange = tripDateRange(trip);
  const status = trip.status || 'Planning';

  const card = el(`
    <div class="trip-card">
      <div class="trip-card-top">
        <span class="trip-status-badge status-${statusSlug(status)}">${status}</span>
        <button class="icon-btn" title="Delete trip" data-delete-trip="1">${ICONS.trash}</button>
      </div>
      <h3 class="trip-name">${escapeHtml(trip.name || 'Untitled Trip')}</h3>
      ${dateRange ? `<div class="trip-dates">${dateRange}</div>` : ''}
      <div class="trip-thumbs">
        ${stops.length ? stops.slice(0,5).map(d => `<div class="trip-thumb" title="${escapeHtml(d.name)}" style="${d.image?`background-image:url(${d.image})`:''}"></div>`).join('') : `<span class="trip-no-stops">No destinations added yet</span>`}
        ${stops.length > 5 ? `<div class="trip-thumb-more">+${stops.length-5}</div>` : ''}
      </div>
      ${checklist.length ? `
        <div class="trip-progress">
          <div class="trip-progress-bar"><div class="fill" style="width:${pct}%"></div></div>
          <span class="trip-progress-label">${doneCount}/${checklist.length} done</span>
        </div>
      ` : ''}
    </div>
  `);
  card.onclick = () => openTripModal(trip.id);
  card.querySelector('[data-delete-trip]').onclick = (e) => { e.stopPropagation(); confirmDeleteTrip(trip.id); };
  return card;
}

function confirmDeleteTrip(tripId){
  const trip = DATA.trips.find(t => t.id === tripId);
  if(!trip) return;
  openConfirm(
    'Delete this trip?',
    `This will permanently remove "${trip.name || 'this trip'}" and its checklist. This cannot be undone.`,
    () => {
      DATA.trips = DATA.trips.filter(t => t.id !== tripId);
      saveData();
      closeAllModals();
    },
    'Delete Trip'
  );
}

/* ============================================================
   PLAN / EDIT TRIP MODAL
   ============================================================ */
function openTripModal(tripId){
  const isEdit = !!tripId;
  const trip = isEdit ? DATA.trips.find(t => t.id === tripId) : {
    id: uid(), name: '', startDate: '', endDate: '', status: 'Planning',
    destinationIds: [], checklist: []
  };
  let workingStops = [...(trip.destinationIds || [])];
  let workingChecklist = (trip.checklist || []).map(c => Object.assign({}, c));
  let workingStatus = trip.status || 'Planning';

  const backdrop = el(`<div class="modal-backdrop"></div>`);
  const modal = el(`
    <div class="modal" style="max-width:640px;">
      <div class="modal-header">
        <h2>${isEdit ? 'Edit Trip' : 'Plan a Trip'}</h2>
        <button class="modal-close" type="button" aria-label="Close dialog">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Trip Name</label>
          <input type="text" id="t-name" value="${escapeHtml(trip.name)}" placeholder="e.g. Spring in Japan">
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label>Start Date</label>
            <input type="date" id="t-start" value="${trip.startDate || ''}">
          </div>
          <div class="form-group">
            <label>End Date</label>
            <input type="date" id="t-end" value="${trip.endDate || ''}">
          </div>
        </div>
        <div class="form-group">
          <label>Status</label>
          <div class="status-stepper" id="t-status"></div>
        </div>
        <div class="form-group">
          <label>Destinations (in visit order)</label>
          <div class="trip-stops" id="t-stops"></div>
          <div class="field-row" style="margin-top:10px;">
            <select id="t-add-dest" style="flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface-alt);"></select>
            <button class="btn btn-secondary" id="t-add-dest-btn">Add Stop</button>
          </div>
        </div>
        <div class="form-group">
          <label>Checklist</label>
          <div id="t-checklist"></div>
          <div class="field-row" style="margin-top:8px;">
            <input type="text" id="t-checklist-input" placeholder="Add an activity or to-do" style="flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface-alt);">
            <button class="btn btn-secondary" id="t-checklist-add">Add</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        ${isEdit ? `<button class="btn btn-danger" id="t-delete" style="margin-right:auto;">Delete</button>` : ''}
        <button class="btn btn-secondary" id="t-cancel">Cancel</button>
        <button class="btn btn-primary" id="t-save">Save Trip</button>
      </div>
    </div>
  `);

  // Status progress path
  function drawStepper(){
    const stepper = modal.querySelector('#t-status');
    stepper.innerHTML = '';
    const activeIdx = TRIP_STATUSES.indexOf(workingStatus);
    TRIP_STATUSES.forEach((status, i) => {
      const stepEl = el(`
        <button type="button" class="status-step ${i===activeIdx?'active':''} ${i<activeIdx?'done':''}" data-status="${status}">
          <span class="step-dot"></span>
          <span class="step-label">${status}</span>
        </button>
      `);
      stepEl.onclick = () => { workingStatus = status; drawStepper(); };
      stepper.appendChild(stepEl);
      if(i < TRIP_STATUSES.length - 1){
        stepper.appendChild(el(`<span class="step-line ${i<activeIdx?'done':''}"></span>`));
      }
    });
  }
  drawStepper();

  // Destination stops (add / reorder / remove)
  function populateAddDestSelect(){
    const sel = modal.querySelector('#t-add-dest');
    const addBtn = modal.querySelector('#t-add-dest-btn');
    sel.innerHTML = '';
    const available = DATA.destinations.filter(d => !workingStops.includes(d.id));
    if(available.length === 0){
      sel.innerHTML = `<option value="">${DATA.destinations.length ? 'All destinations added' : 'No destinations yet'}</option>`;
      addBtn.disabled = true;
      return;
    }
    addBtn.disabled = false;
    available.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.id; opt.textContent = d.name || 'Untitled';
      sel.appendChild(opt);
    });
  }

  function drawStops(){
    const stopsWrap = modal.querySelector('#t-stops');
    stopsWrap.innerHTML = '';
    if(workingStops.length === 0){
      stopsWrap.appendChild(el(`<p class="trip-empty-hint">No destinations added yet. Pick one below.</p>`));
    }
    workingStops.forEach((destId, i) => {
      const dest = DATA.destinations.find(d => d.id === destId);
      const row = el(`
        <div class="trip-stop-row">
          <span class="trip-stop-num">${i+1}</span>
          <div class="trip-stop-thumb" style="${dest && dest.image ? `background-image:url(${dest.image})` : ''}"></div>
          <span class="trip-stop-name">${escapeHtml(dest ? dest.name : 'Deleted destination')}</span>
          <div class="trip-stop-actions">
            <button class="icon-btn" title="Move up" data-move="up" ${i===0?'disabled':''}>&uarr;</button>
            <button class="icon-btn" title="Move down" data-move="down" ${i===workingStops.length-1?'disabled':''}>&darr;</button>
            <button class="icon-btn" title="Remove stop" data-remove="1">${ICONS.trash}</button>
          </div>
        </div>
      `);
      row.querySelector('[data-move="up"]').onclick = () => {
        if(i === 0) return;
        [workingStops[i-1], workingStops[i]] = [workingStops[i], workingStops[i-1]];
        drawStops();
      };
      row.querySelector('[data-move="down"]').onclick = () => {
        if(i === workingStops.length - 1) return;
        [workingStops[i+1], workingStops[i]] = [workingStops[i], workingStops[i+1]];
        drawStops();
      };
      row.querySelector('[data-remove]').onclick = () => {
        workingStops.splice(i, 1);
        drawStops();
      };
      stopsWrap.appendChild(row);
    });
    populateAddDestSelect();
  }
  drawStops();

  modal.querySelector('#t-add-dest-btn').onclick = () => {
    const sel = modal.querySelector('#t-add-dest');
    if(!sel.value) return;
    workingStops.push(sel.value);
    drawStops();
  };

  // Checklist
  function drawChecklist(){
    const wrap = modal.querySelector('#t-checklist');
    wrap.innerHTML = '';
    if(workingChecklist.length === 0){
      wrap.appendChild(el(`<p class="trip-empty-hint">No checklist items yet.</p>`));
    }
    workingChecklist.forEach((item, i) => {
      const row = el(`
        <div class="checklist-item">
          <label class="checklist-check">
            <input type="checkbox" ${item.done?'checked':''}>
            <span class="${item.done?'done':''}">${escapeHtml(item.text)}</span>
          </label>
          <button class="icon-btn" title="Remove item" data-remove-check="1">${ICONS.trash}</button>
        </div>
      `);
      row.querySelector('input[type=checkbox]').onchange = (e) => { item.done = e.target.checked; drawChecklist(); };
      row.querySelector('[data-remove-check]').onclick = () => { workingChecklist.splice(i, 1); drawChecklist(); };
      wrap.appendChild(row);
    });
  }
  drawChecklist();

  function addChecklistItem(){
    const input = modal.querySelector('#t-checklist-input');
    const text = input.value.trim();
    if(!text) return;
    workingChecklist.push({ id: uid(), text, done: false });
    input.value = '';
    drawChecklist();
    input.focus();
  }
  modal.querySelector('#t-checklist-add').onclick = addChecklistItem;
  modal.querySelector('#t-checklist-input').addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ e.preventDefault(); addChecklistItem(); }
  });

  function close(){ closeModal(); }
  modal.querySelector('.modal-close').onclick = close;
  modal.querySelector('#t-cancel').onclick = close;
  backdrop.addEventListener('click', (e) => { if(e.target === backdrop) close(); });

  if(isEdit){
    modal.querySelector('#t-delete').onclick = () => confirmDeleteTrip(trip.id);
  }

  modal.querySelector('#t-save').onclick = () => {
    const name = modal.querySelector('#t-name').value.trim();
    trip.name = name || 'Untitled Trip';
    trip.startDate = modal.querySelector('#t-start').value || '';
    trip.endDate = modal.querySelector('#t-end').value || '';
    trip.status = workingStatus;
    trip.destinationIds = workingStops;
    trip.checklist = workingChecklist;

    if(!isEdit){ DATA.trips.push(trip); }
    saveData();
    closeModal();
  };

  backdrop.appendChild(modal);
  openModal(backdrop);
}

/* ============================================================
   HISTORY VIEW
   ============================================================ */
function renderHistoryView(){
  const wrap = el(`<div></div>`);
  wrap.appendChild(el(`
    <div class="view-header">
      <div><h1>History</h1><p>A log of the trips you've actually taken.</p></div>
    </div>
  `));

  if(DATA.history.length === 0){
    wrap.appendChild(emptyState('📓', 'No trips logged yet', 'Once you visit a destination, log it here to keep a record of how it went.', DATA.destinations.length ? 'Log a Trip' : null, () => openHistoryModal()));
    return wrap;
  }

  const toggle = el(`
    <div class="unit-toggle" style="margin-bottom:18px;">
      <button data-mode="list">List</button>
      <button data-mode="timeline">Timeline</button>
    </div>
  `);
  toggle.querySelectorAll('[data-mode]').forEach(btn => {
    if(btn.getAttribute('data-mode') === historyViewMode) btn.classList.add('active');
    btn.onclick = () => { historyViewMode = btn.getAttribute('data-mode'); render(); };
  });
  wrap.appendChild(toggle);

  wrap.appendChild(historyViewMode === 'timeline' ? renderHistoryTimeline() : renderHistoryList());
  return wrap;
}

function renderHistoryList(){
  const sorted = [...DATA.history].sort((a,b) => new Date(b.date) - new Date(a.date));
  const list = el('<div></div>');
  sorted.forEach(entry => {
    const dest = DATA.destinations.find(d => d.id === entry.destinationId);
    const row = el(`
      <div class="history-entry">
        <div class="thumb-sm" style="${dest && dest.image ? `background-image:url(${dest.image})` : ''}"></div>
        <div class="body">
          <div class="top-line">
            <span class="name">${escapeHtml(dest ? dest.name : 'Unknown destination')}</span>
            <span class="date">${formatDate(entry.date)}</span>
          </div>
          <div class="stars">${'★'.repeat(entry.rating)}${'☆'.repeat(5-entry.rating)}</div>
          <div class="summary">${escapeHtml(entry.summary || '')}</div>
        </div>
        <button class="icon-btn" title="Delete entry" data-history-id="${entry.id}">${ICONS.trash}</button>
      </div>
    `);
    const body = row.querySelector('.body');
    body.style.cursor = dest ? 'pointer' : 'default';
    if(dest) body.onclick = () => openDetailModal(dest.id);
    row.querySelector('[data-history-id]').onclick = (e) => {
      e.stopPropagation();
      confirmDeleteHistoryEntry(entry.id);
    };
    list.appendChild(row);
  });
  return list;
}

function renderHistoryTimeline(){
  const sorted = [...DATA.history].sort((a,b) => new Date(a.date) - new Date(b.date));
  const timelineWrap = el('<div class="timeline-wrap"></div>');
  const track = el('<div class="timeline-track"></div>');
  sorted.forEach(entry => {
    const dest = DATA.destinations.find(d => d.id === entry.destinationId);
    const item = el(`
      <div class="timeline-item">
        <div class="timeline-date">${formatDate(entry.date)}</div>
        <div class="timeline-dot"></div>
        <div class="timeline-card">
          <div class="timeline-thumb" style="${dest && dest.image ? `background-image:url(${dest.image})` : ''}"></div>
          <div class="timeline-info">
            <div class="timeline-name">${escapeHtml(dest ? dest.name : 'Unknown destination')}</div>
            <div class="timeline-stars">${'★'.repeat(entry.rating)}${'☆'.repeat(5-entry.rating)}</div>
          </div>
        </div>
      </div>
    `);
    const card = item.querySelector('.timeline-card');
    if(dest){
      card.style.cursor = 'pointer';
      card.onclick = () => openDetailModal(dest.id);
    }
    track.appendChild(item);
  });
  timelineWrap.appendChild(track);
  return timelineWrap;
}

function confirmDeleteHistoryEntry(entryId, afterDelete){
  openConfirm(
    'Delete this trip entry?',
    'This will permanently remove this log entry. This cannot be undone.',
    () => {
      DATA.history = DATA.history.filter(h => h.id !== entryId);
      saveData();
      closeModal();
      if(afterDelete) afterDelete();
      render();
    },
    'Delete Entry'
  );
}

function formatDate(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  if(isNaN(d)) return dateStr;
  return d.toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' });
}

/* ============================================================
   SETTINGS VIEW
   ============================================================ */
function renderSettingsView(){
  const wrap = el(`<div></div>`);
  wrap.appendChild(el(`
    <div class="view-header">
      <div><h1>Settings</h1><p>Manage your home base, units, and data.</p></div>
    </div>
  `));

  const home = DATA.settings.homeLocation;
  const homeSection = el(`
    <div class="settings-section">
      <h3>Home Base</h3>
      <div class="desc">Used as the fixed starting point for all distance calculations.</div>
      <div class="field-row">
        <input type="text" id="home-name" placeholder="e.g. Halifax, Nova Scotia" value="${escapeHtml(home.name)}">
        <button class="btn btn-primary" id="home-lookup">Look Up</button>
      </div>
      <div class="geocode-status" id="home-status"></div>
      <div class="divider-or">or enter coordinates manually</div>
      <div class="field-row">
        <input type="number" step="any" id="home-lat" placeholder="Latitude" value="${home.lat ?? ''}">
        <input type="number" step="any" id="home-long" placeholder="Longitude" value="${home.long ?? ''}">
      </div>
      <div class="hint">${home.lat != null ? `Currently set to ${home.lat.toFixed(3)}, ${home.long.toFixed(3)}${home.name ? ' (' + escapeHtml(home.name) + ')' : ''}` : 'No home location set yet.'}</div>
      <div style="margin-top:14px;"><button class="btn btn-primary" id="home-save">Save Home Base</button></div>
    </div>
  `);
  wrap.appendChild(homeSection);

  homeSection.querySelector('#home-lookup').onclick = async () => {
    const nameInput = homeSection.querySelector('#home-name');
    const status = homeSection.querySelector('#home-status');
    const name = nameInput.value.trim();
    if(!name){ status.textContent = 'Enter a place name first.'; status.className = 'geocode-status err'; return; }
    status.textContent = 'Looking up location…';
    status.className = 'geocode-status';
    try {
      const loc = await geocodeLocation(name);
      homeSection.querySelector('#home-lat').value = loc.lat;
      homeSection.querySelector('#home-long').value = loc.long;
      status.textContent = 'Found it. Review below and save.';
      status.className = 'geocode-status ok';
    } catch(e){
      status.textContent = "Couldn't find that location. Enter coordinates manually below.";
      status.className = 'geocode-status err';
    }
  };

  homeSection.querySelector('#home-save').onclick = () => {
    const name = homeSection.querySelector('#home-name').value.trim();
    const lat = parseFloat(homeSection.querySelector('#home-lat').value);
    const long = parseFloat(homeSection.querySelector('#home-long').value);
    if(isNaN(lat) || isNaN(long)){ alert('Please provide valid coordinates (via lookup or manual entry).'); return; }
    DATA.settings.homeLocation = { name, lat, long };
    saveData();
    render();
  };

  // Units
  const unitSection = el(`
    <div class="settings-section">
      <h3>Distance Units</h3>
      <div class="desc">Choose how distances are displayed throughout the app.</div>
      <div class="unit-toggle">
        <button data-unit="km" class="${DATA.settings.unit==='km'?'active':''}">Kilometers</button>
        <button data-unit="mi" class="${DATA.settings.unit==='mi'?'active':''}">Miles</button>
      </div>
    </div>
  `);
  unitSection.querySelectorAll('[data-unit]').forEach(btn => {
    btn.onclick = () => { DATA.settings.unit = btn.getAttribute('data-unit'); saveData(); render(); };
  });
  wrap.appendChild(unitSection);

  // Data management
  const dataSection = el(`
    <div class="settings-section">
      <h3>Your Data</h3>
      <div class="desc">Back up your destinations and history, move them to another device, or start fresh.</div>
      <div class="field-row">
        <button class="btn btn-secondary" id="export-btn">Export Data (.json)</button>
        <button class="btn btn-secondary" id="import-btn">Import Data</button>
        <button class="btn btn-danger" id="reset-btn">Clear All Data</button>
      </div>
      <input type="file" id="import-file" accept=".json" style="display:none">
      <div class="status-msg" id="data-status"></div>
    </div>
  `);
  dataSection.querySelector('#export-btn').onclick = exportData;
  const fileInput = dataSection.querySelector('#import-file');
  dataSection.querySelector('#import-btn').onclick = () => fileInput.click();
  fileInput.onchange = (e) => importData(e.target.files[0], dataSection.querySelector('#data-status'));
  dataSection.querySelector('#reset-btn').onclick = () => confirmResetData();
  wrap.appendChild(dataSection);

  return wrap;
}

function exportData(){
  const blob = new Blob([JSON.stringify(DATA, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `travel-ranker-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function importData(file, statusEl){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if(!parsed || !Array.isArray(parsed.destinations)){
        throw new Error('This file does not look like a Travel Ranker backup.');
      }
      openConfirm(
        'Import Data?',
        'This will replace all current destinations, history, and settings with the contents of this file. This cannot be undone.',
        () => {
          DATA = Object.assign(defaultData(), parsed);
          saveData();
          closeModal();
          render();
        },
        'Import and Replace'
      );
    } catch(err){
      if(statusEl){ statusEl.textContent = 'Import failed: ' + err.message; statusEl.className = 'status-msg err'; }
    }
  };
  reader.readAsText(file);
}

function confirmResetData(){
  openConfirm(
    'Clear all data?',
    'This will permanently delete every destination, rating, and history entry. This cannot be undone.',
    () => {
      DATA = defaultData();
      saveData();
      closeModal();
      render();
    },
    'Clear All Data'
  );
}

function openConfirm(title, desc, onConfirm, confirmLabel='Confirm'){
  const backdrop = el(`
    <div class="modal-backdrop" style="align-items:center;">
      <div class="confirm-box">
        <h3>${title}</h3>
        <p>${desc}</p>
        <div style="display:flex;gap:10px;justify-content:center;">
          <button class="btn btn-secondary" id="confirm-cancel">Cancel</button>
          <button class="btn btn-danger" id="confirm-ok">${confirmLabel}</button>
        </div>
      </div>
    </div>
  `);
  backdrop.querySelector('#confirm-cancel').onclick = closeModal;
  backdrop.querySelector('#confirm-ok').onclick = onConfirm;
  backdrop.addEventListener('click', (e) => { if(e.target === backdrop) closeModal(); });
  openModal(backdrop);
}
